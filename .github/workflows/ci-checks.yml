# Reusable PR/main CI — separate jobs for visibility in the checks UI.
# Called by plugins.yml and release.yml.

name: CI checks

on:
  workflow_call:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/dart-setup

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/dart-setup

      - name: Run unit tests
        run: dart test
